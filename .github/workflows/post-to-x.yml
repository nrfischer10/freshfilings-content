name: Draft ready to post

on:
  push:
    branches: [main]
    paths:
      - 'content/x/draft-*.md'

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new draft added in this push
        id: find_draft
        run: |
          NEW=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'content/x/draft-*.md' | head -1)
          echo "draft_file=$NEW" >> "$GITHUB_OUTPUT"
          if [ -z "$NEW" ]; then
            echo "No new draft file detected."
          else
            echo "Draft ready: $NEW"
          fi

      - name: Print draft to summary
        if: steps.find_draft.outputs.draft_file != ''
        run: |
          DRAFT="${{ steps.find_draft.outputs.draft_file }}"
          echo "## Post ready to copy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat "$DRAFT" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**File:** \`$DRAFT\`" >> "$GITHUB_STEP_SUMMARY"
